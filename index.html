<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <h1>Personal Expense Tracker</h1>
      </header>

      <main class="dashboard">
        <aside class="sidebar">
          <section class="total-card">
            <p class="total-card__label">Total Expenses</p>
            <strong class="total-card__value" id="displayed-total">$0.00</strong>
            <div class="total-card__meta">
              <span><strong id="visible-count">0</strong> visible</span>
              <span><strong id="stored-count">0</strong> stored</span>
            </div>
          </section>

          <section class="panel panel--form">
            <div class="panel__heading">
              <div>
                <h2 id="form-title">Add Expense</h2>
                <p class="panel__subtext" id="form-status">Create mode</p>
              </div>
            </div>

            <form id="expense-form" novalidate>
              <div class="field-grid">
                <label class="field field--full">
                  <span>Title</span>
                  <input
                    id="title"
                    name="title"
                    type="text"
                    maxlength="80"
                    placeholder="TITLE"
                    required
                  />
                </label>

                <label class="field">
                  <span>Amount</span>
                  <input
                    id="amount"
                    name="amount"
                    type="number"
                    min="0.01"
                    step="0.01"
                    placeholder="0.00"
                    required
                  />
                </label>

                <label class="field">
                  <span>Category</span>
                  <select id="category" name="category" required>
                    <option value="">Select</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                  </select>
                </label>

                <label class="field field--full">
                  <span>Date</span>
                  <input id="date" name="date" type="date" required />
                </label>
              </div>

              <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>

              <div class="form-actions">
                <button class="button button--primary" type="submit" id="submit-button">
                  Add Expense
                </button>
                <button class="button button--ghost" type="button" id="cancel-button" hidden>
                  Cancel Edit
                </button>
              </div>
            </form>

            <div class="legend">
              <p class="legend__title">Categories</p>
              <div class="legend__items">
                <span class="legend__item" data-category="Food">Food</span>
                <span class="legend__item" data-category="Transport">Transport</span>
                <span class="legend__item" data-category="Shopping">Shopping</span>
                <span class="legend__item" data-category="Health">Health</span>
                <span class="legend__item" data-category="Entertainment">Entertainment</span>
                <span class="legend__item" data-category="Other">Other</span>
              </div>
            </div>
          </section>
        </aside>

        <section class="content">
          <section class="panel panel--filters">
            <div class="filters-layout">
              <div class="filters-group">
                <label class="field">
                  <span>Filter by category</span>
                  <select id="filter-category" name="filter-category">
                    <option value="All">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                  </select>
                </label>

                <div class="filter-actions">
                  <button class="button button--primary" type="button" id="focus-form">
                    Add Expense
                  </button>
                  <button class="button button--icon" type="button" id="clear-filters" aria-label="Reset filters">
                    +
                  </button>
                </div>
              </div>

              <div class="filters-group filters-group--split">
                <div class="date-range">
                  <label class="field">
                    <span>Date range</span>
                    <input id="filter-from" name="filter-from" type="date" />
                  </label>

                  <label class="field field--to">
                    <span class="field__spacer">&nbsp;</span>
                    <input id="filter-to" name="filter-to" type="date" />
                  </label>
                </div>

                <div class="sort-row">
                  <label class="field">
                    <span>Sort by</span>
                    <select id="sort-by" name="sort-by">
                      <option value="date">Date</option>
                      <option value="amount">Amount</option>
                      <option value="category">Category</option>
                    </select>
                  </label>

                  <label class="field field--order">
                    <span>Order</span>
                    <select id="sort-order" name="sort-order">
                      <option value="desc">Descending</option>
                      <option value="asc">Ascending</option>
                    </select>
                  </label>
                </div>
              </div>
            </div>
          </section>

          <section class="panel panel--list">
            <div class="panel__heading panel__heading--list">
              <div>
                <h2>Expenses</h2>
                <p class="panel__subtext" id="results-summary">Showing 0 expenses.</p>
              </div>
            </div>

            <div class="list-shell">
              <div class="empty-state" id="empty-state" aria-live="polite">
                <div class="empty-state__illustration" aria-hidden="true">
                  <span></span>
                </div>
                <h3>No expenses found</h3>
                <p>Try adding an expense or adjusting your current filters.</p>
              </div>

              <ul class="expense-list" id="expense-list" aria-live="polite"></ul>
            </div>
          </section>
        </section>
      </main>
    </div>

    <template id="expense-item-template">
      <li class="expense-row">
        <div class="expense-row__main">
          <h3 class="expense-row__title"></h3>
          <span class="chip chip--category"></span>
        </div>
        <p class="expense-row__date"></p>
        <p class="expense-row__amount"></p>
        <div class="expense-row__actions">
          <button class="button button--small button--ghost" type="button" data-action="edit">
            Edit
          </button>
          <button class="button button--small button--danger" type="button" data-action="delete">
            Delete
          </button>
        </div>
      </li>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
